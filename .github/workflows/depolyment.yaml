name: Deploy FilterFacts to Naver Cloud Kubernetes

on:
  push:
    branches:
      - deploy  # deploy 브랜치에 push 될 때 자동 배포

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 소스 코드 체크아웃
      - name: Checkout source
        uses: actions/checkout@v3

      # 2️⃣ JDK 21 설정 (Gradle 빌드를 위해)
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3️⃣ Gradle 빌드
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      # 4️⃣ Docker 로그인 (Naver Cloud Container Registry)
      - name: Login to Naver Cloud Container Registry
        run: |
          echo "${{ secrets.NCP_REGISTRY_PASSWORD }}" | docker login \
            -u "${{ secrets.NCP_REGISTRY_USERNAME }}" \
            --password-stdin contest-cluster54-registry.kr.ncr.ntruss.com

      # 5️⃣ Docker 이미지 빌드
      - name: Build Docker image
        run: |
          docker build -t contest-cluster54-registry.kr.ncr.ntruss.com/filterfacts-backend:latest .

      # 6️⃣ NCR로 이미지 푸시
      - name: Push Docker image
        run: |
          docker push contest-cluster54-registry.kr.ncr.ntruss.com/filterfacts-backend:latest

      # 7️⃣ ✅ Naver Cloud IAM Authenticator 설치
      - name: Install Naver Cloud IAM Authenticator
        run: |
          echo "Downloading ncp-iam-authenticator..."
          curl -o ncp-iam-authenticator -L https://github.com/NaverCloudPlatform/ncp-iam-authenticator/releases/latest/download/ncp-iam-authenticator_linux_amd64
          
          # 다운로드 확인
          file ncp-iam-authenticator
          ls -lh ncp-iam-authenticator
          
          chmod +x ncp-iam-authenticator
          sudo mv ncp-iam-authenticator /usr/local/bin/


      # 8️⃣ ✅ Naver Cloud Access/Secret Key 파일 생성 (~/.ncloud/configure)
      - name: Configure Naver Cloud credentials
        run: |
          mkdir -p $HOME/.ncloud
          echo "[ncloud]" > $HOME/.ncloud/configure
          echo "ncloud_access_key_id = ${NCP_ACCESS_KEY_ID}" >> $HOME/.ncloud/configure
          echo "ncloud_secret_access_key = ${NCP_SECRET_ACCESS_KEY}" >> $HOME/.ncloud/configure
          echo "ncloud_api_url = https://ncloud.apigw.ntruss.com" >> $HOME/.ncloud/configure
          chmod 600 $HOME/.ncloud/configure
          # ✅ 루트 경로에도 동일한 인증파일 복사
          sudo mkdir -p /root/.ncloud
          sudo cp $HOME/.ncloud/configure /root/.ncloud/configure
          sudo chmod 600 /root/.ncloud/configure
        env:
          NCP_ACCESS_KEY_ID: ${{ secrets.NCP_ACCESS_KEY_ID }}
          NCP_SECRET_ACCESS_KEY: ${{ secrets.NCP_SECRET_ACCESS_KEY }}

      # 9️⃣ ✅ kubeconfig 복원
      - name: Set up kubeconfig for NKS
        run: |
          mkdir -p $HOME/.kube
          printf "%s" "${{ secrets.NKS_KUBECONFIG1 }}" | base64 --decode > $HOME/.kube/config

      # 🔟 ✅ (선택) 디버깅: 실제 경로와 권한 확인
      - name: Debug IAM Authenticator Paths
        run: |
          echo "Home: $HOME"
          echo "Runner user: $(whoami)"
          echo "Listing $HOME/.ncloud"
          ls -al $HOME/.ncloud || true
          echo "Listing /root/.ncloud"
          sudo ls -al /root/.ncloud || true
          echo "Listing /usr/local/bin"
          ls -al /usr/local/bin | grep ncp || true
          
          # 1️⃣ 러너 아키텍처 확인
          echo "Runner architecture:"
          uname -m
      
          # 2️⃣ 바이너리 아키텍처 확인
          echo "ncp-iam-authenticator file type:"
          file /usr/local/bin/ncp-iam-authenticator

      # 11️⃣ ✅ Kubernetes 배포 실행 (Inline ENV 주입 방식)
      - name: Apply Kubernetes manifests
        run: |
          export NCP_ACCESS_KEY_ID=$(grep ncloud_access_key_id $HOME/.ncloud/configure | awk -F'= ' '{print $2}')
          export NCP_SECRET_ACCESS_KEY=$(grep ncloud_secret_access_key $HOME/.ncloud/configure | awk -F'= ' '{print $2}')
          kubectl apply -f deployment.yaml --validate=false

